<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Chessboard Component</title>
    
    <!-- Chessboard.js & Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <!-- Chess.js for validation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #board { width: 400px; margin: auto; }
    </style>
</head>
<body>
    <div id="board"></div>

    <script>
        // --- Streamlit Custom Component API (Tanpa Library npm) ---
        function sendMessageToStreamlitClient(type, data) {
            const outData = Object.assign({
                isStreamlitMessage: true,
                type: type,
            }, data);
            window.parent.postMessage(outData, "*");
        }

        function setFrameHeight(height) {
            sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: height});
        }

        function sendDataToPython(data) {
            sendMessageToStreamlitClient("streamlit:setComponentValue", data);
        }

        // --- Logika Catur ---
        let board = null;
        let game = new Chess();

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            // Kirim data langkah ke backend Python
            sendDataToPython({
                value: {
                    "source": source,
                    "target": target,
                    "promotion": move.promotion ? move.promotion : ""
                },
                dataType: "json"
            });
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function onRender(args) {
            if (args.fen) {
                game.load(args.fen);
            }
            
            if (!board) {
                var config = {
                    draggable: true,
                    position: game.fen(),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                    onDragStart: onDragStart,
                    onDrop: onDrop,
                    onSnapEnd: onSnapEnd
                };
                board = Chessboard('board', config);
            } else {
                board.position(game.fen(), false);
            }
            
            setFrameHeight(450);
        }

        // --- Inisialisasi Event Listener Streamlit ---
        window.addEventListener("message", function(event) {
            if (event.data.type === "streamlit:render") {
                onRender(event.data.args);
            }
        });

        // Beritahu Streamlit bahwa komponen sudah siap
        sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});
        
    </script>
</body>
</html>
